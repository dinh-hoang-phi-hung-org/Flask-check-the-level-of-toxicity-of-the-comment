server {
    server_name socialmedia.ai.dhph.me;

    # Nginx là nguồn duy nhất xử lý CORS (kể cả lỗi 504)
    add_header 'Access-Control-Allow-Origin' 'https://socialmedia.dhph.me' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/socialmedia.ai.dhph.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socialmedia.ai.dhph.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name socialmedia.ai.dhph.me;
    return 301 https://$host$request_uri;
}